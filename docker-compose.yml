version: "3.9"

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: watchdog
      POSTGRES_PASSWORD: watchdog
      POSTGRES_DB: watchdog
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U watchdog"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://watchdog:watchdog@db:5432/watchdog
      BOOTSTRAP_API_KEYS: dev-key-1234
      SECRET_KEY: docker-dev-secret-key
      WEBHOOK_URL: http://webhook-receiver:9000/hook
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  anomaly-worker:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://watchdog:watchdog@db:5432/watchdog
      WEBHOOK_URL: http://webhook-receiver:9000/hook
      ANOMALY_WINDOW_MINUTES: 5
      ANOMALY_LOOKBACK_WINDOWS: 6
      ANOMALY_ZSCORE_THRESHOLD: 3.0
      ALERT_COOLDOWN_MINUTES: 10
    volumes:
      - .:/app
    command: >
      sh -c "alembic upgrade head && python -m anomaly_worker.main"

  log-generator:
    build: .
    depends_on:
      api:
        condition: service_started
    environment:
      WATCHDOG_API_URL: http://api:8000
      WATCHDOG_API_KEY: dev-key-1234
      PROFILE: burst
      TICK_SECONDS: 5
    volumes:
      - .:/app
    command: python -m log_generator.main

volumes:
  pg_data:
