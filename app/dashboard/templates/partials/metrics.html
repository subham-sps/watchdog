<div class="card-body">
  <div class="metrics-grid">
    <div class="metric-item">
      <div class="metric-value">{{ metrics.total_events | format_number }}</div>
      <div class="metric-label">Total Events</div>
    </div>
    <div class="metric-item">
      <div class="metric-value">{{ metrics.events_last_hour | format_number }}</div>
      <div class="metric-label">Last Hour</div>
    </div>
    <div class="metric-item">
      <div class="metric-value {% if metrics.active_alerts > 0 %}alert-color{% endif %}">
        {{ metrics.active_alerts }}{% if metrics.active_alerts > 0 %} ⚠{% endif %}
      </div>
      <div class="metric-label">Active Alerts</div>
    </div>
    <div class="metric-item">
      <div class="metric-value">{{ metrics.total_sources }}</div>
      <div class="metric-label">Sources</div>
    </div>
  </div>
</div>
