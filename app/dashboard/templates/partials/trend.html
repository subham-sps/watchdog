<canvas id="trend-chart-{{ chart_id }}" style="width:100%;height:160px;"></canvas>
<script>
(function() {
  var ctx = document.getElementById('trend-chart-{{ chart_id }}');
  if (!ctx) return;
  if (ctx._chartInstance) { ctx._chartInstance.destroy(); }
  var chart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: {{ labels | tojson }},
      datasets: [{
        label: 'Events',
        data: {{ counts | tojson }},
        backgroundColor: {{ colors | tojson }},
        borderRadius: 3,
        borderSkipped: false,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            title: function(items) { return items[0].label; },
            label: function(item) { return item.raw + ' events'; }
          }
        }
      },
      scales: {
        x: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#8892a4', font: { size: 11 } } },
        y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#8892a4', font: { size: 11 } }, beginAtZero: true }
      }
    }
  });
  ctx._chartInstance = chart;
})();
</script>
